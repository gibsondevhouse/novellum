name: Desktop Build

# Phase-004 of plan-017 stage-008. Produces unsigned installer
# artifacts for macOS Apple Silicon and Windows x64 to validate the
# packaging pipeline. Code-signing/notarisation is plan-018 stage-010
# work — see evidence/signing-posture.md for the deferred plan.

on:
  workflow_dispatch:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_glob: 'src-tauri/target/release/bundle/dmg/*.dmg'
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_glob: 'src-tauri/target/release/bundle/msi/*.msi'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version
        run: pnpm run version:sync

      - name: Fetch bundled Node runtime
        env:
          TARGET_TRIPLES: ${{ matrix.target }}
        run: pnpm run fetch:node

      - name: Build SvelteKit
        run: pnpm run build

      - name: Build desktop installer
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: novellum-${{ matrix.target }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
