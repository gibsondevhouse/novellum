<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Text &amp; borders</title>
<link rel="stylesheet" href="_preview.css">
<style>
	.wrap { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
	.col { display: grid; gap: var(--space-2); }
	.row {
		display: grid;
		grid-template-columns: 16px 1fr auto;
		align-items: center;
		gap: var(--space-3);
		padding: var(--space-2) var(--space-3);
		border-radius: var(--radius-sm);
		background: var(--surface-overlay);
		border: 1px solid var(--border-default);
	}
	.dot { width: 16px; height: 16px; border-radius: 50%; }
	.label { font-size: 12px; font-weight: var(--w-medium); }
	.value { font-family: var(--mono); font-size: 11px; color: var(--fg3); }
	.bar { height: 24px; border-radius: var(--radius-sm); background: var(--surface-overlay); display: flex; align-items: center; padding: 0 var(--space-3); }
	.bar.subtle  { border: 1px solid var(--border-subtle); }
	.bar.default { border: 1px solid var(--border-default); }
	.bar.strong  { border: 1px solid var(--border-strong); }
	.bar.focus   { border: 2px solid var(--border-focus); }
</style>
</head><body>
<div class="wrap">
	<div class="col">
		<div class="row"><span class="dot" style="background: var(--fg1);"></span><span class="label" style="color: var(--fg1);">fg1 — primary</span><span class="value">#e5e5e5</span></div>
		<div class="row"><span class="dot" style="background: var(--fg2);"></span><span class="label" style="color: var(--fg2);">fg2 — secondary</span><span class="value">#9ca3af</span></div>
		<div class="row"><span class="dot" style="background: var(--fg3);"></span><span class="label" style="color: var(--fg3);">fg3 — muted</span><span class="value">#6b7280</span></div>
	</div>
	<div class="col">
		<div class="bar subtle"><span class="value">border-subtle · rgba(255,255,255,.04)</span></div>
		<div class="bar default"><span class="value">border-default · rgba(255,255,255,.08)</span></div>
		<div class="bar strong"><span class="value">border-strong · rgba(255,255,255,.16)</span></div>
		<div class="bar focus"><span class="value">border-focus · rgba(59,130,246,.6)</span></div>
	</div>
</div>
</body></html>
