<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="_preview.css">
<style>
	.grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-5); }
	.field { display: flex; flex-direction: column; gap: var(--space-1); }
	.label {
		font-size: 11px;
		font-weight: var(--w-medium);
		text-transform: uppercase;
		letter-spacing: 0.05em;
		color: var(--fg2);
	}
	.input {
		background: var(--surface-ground);
		color: var(--fg1);
		border: 1px solid var(--border-default);
		border-radius: var(--radius-sm);
		padding: var(--space-2) var(--space-3);
		font-size: var(--text-sm);
		font-family: var(--sans);
		width: 100%;
		transition: border-color var(--dur-fast) var(--ease-standard);
	}
	.input:focus { outline: none; border-color: var(--accent-nova-blue); }
	.input--error { border-color: var(--state-error); }
	.error-msg { font-size: 12px; color: var(--state-error); }
	.textarea { min-height: 72px; resize: vertical; font-family: var(--sans); }
	.dossier {
		grid-column: 1 / -1;
		display: grid;
		gap: var(--space-3);
		padding-top: var(--space-4);
		border-top: 1px solid var(--border-subtle);
	}
	.dossier .label {
		font-size: 11px;
		letter-spacing: 0.03em;
		text-transform: none;
		color: var(--fg3);
		font-weight: var(--w-medium);
	}
	.dossier-input {
		width: 100%;
		padding: 4px 4px;
		border: 1px solid transparent;
		border-radius: var(--radius-sm);
		background: transparent;
		color: var(--fg1);
		font: inherit;
		font-family: var(--serif-display);
		font-size: 18px;
	}
	.dossier-input:hover { border-color: var(--border-subtle); }
</style>
</head><body>
<div class="grid">
	<div class="field">
		<label class="label" for="title">Project title</label>
		<input id="title" class="input" value="The Mariner's Glass">
	</div>
	<div class="field">
		<label class="label" for="genre">Genre</label>
		<input id="genre" class="input" placeholder="Literary, Mystery, …">
	</div>
	<div class="field" style="grid-column: 1 / -1;">
		<label class="label" for="logline">Logline</label>
		<textarea id="logline" class="input textarea">A retired cartographer is summoned back to sea by a letter that should never have reached her.</textarea>
	</div>
	<div class="field">
		<label class="label" for="bad">API key</label>
		<input id="bad" class="input input--error" value="sk-or-v1-…(invalid)">
		<span class="error-msg">That key was rejected by OpenRouter.</span>
	</div>
	<div class="field dossier">
		<label class="label">Dossier — borderless inline edit</label>
		<input class="dossier-input" value="Halia Marrowfen">
	</div>
</div>
</body></html>
