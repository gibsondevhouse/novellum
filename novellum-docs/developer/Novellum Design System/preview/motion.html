<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Motion</title>
<link rel="stylesheet" href="_preview.css">
<style>
	.col { display: grid; gap: var(--space-3); }
	.section { display: grid; gap: var(--space-2); }
	.section-label { font-family: var(--mono); font-size: 11px; color: var(--fg3); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
	.row { display: grid; grid-template-columns: 110px 1fr 60px; gap: var(--space-3); align-items: center; padding: 4px 0; }
	.tag { font-family: var(--mono); font-size: 11px; color: var(--fg2); }
	.value { font-family: var(--mono); font-size: 11px; color: var(--fg3); text-align: right; }
	.track {
		position: relative;
		height: 10px;
		background: var(--surface-overlay);
		border: 1px solid var(--border-subtle);
		border-radius: var(--radius-full);
		overflow: hidden;
	}
	.dot {
		position: absolute;
		top: 50%;
		transform: translateY(-50%);
		width: 14px;
		height: 14px;
		border-radius: 50%;
		background: var(--accent-nova-blue);
		box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent-nova-blue) 30%, transparent);
		left: 0;
		animation: slide 2.4s infinite;
	}
	.dot.standard   { animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
	.dot.decelerate { animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
	.dot.editorial  { animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
	.dot.exit       { animation-timing-function: cubic-bezier(0.4, 0, 1, 1); }
	@keyframes slide {
		0%, 30% { left: 0; }
		50%, 80% { left: calc(100% - 14px); }
	}
</style>
</head><body>
<div class="col">
	<div class="section">
		<span class="section-label">Durations</span>
		<div class="row"><span class="tag">instant</span><span></span><span class="value">80ms</span></div>
		<div class="row"><span class="tag">fast</span><span></span><span class="value">100ms</span></div>
		<div class="row"><span class="tag">base</span><span></span><span class="value">150ms</span></div>
		<div class="row"><span class="tag">enter</span><span></span><span class="value">200ms</span></div>
		<div class="row"><span class="tag">slow</span><span></span><span class="value">250ms</span></div>
		<div class="row"><span class="tag">page</span><span></span><span class="value">320ms</span></div>
	</div>
	<div class="section">
		<span class="section-label">Easings</span>
		<div class="row"><span class="tag">standard</span><span class="track"><span class="dot standard"></span></span><span class="value">.4,0,.2,1</span></div>
		<div class="row"><span class="tag">decelerate</span><span class="track"><span class="dot decelerate"></span></span><span class="value">0,0,.2,1</span></div>
		<div class="row"><span class="tag">editorial</span><span class="track"><span class="dot editorial"></span></span><span class="value">.16,1,.3,1</span></div>
		<div class="row"><span class="tag">exit</span><span class="track"><span class="dot exit"></span></span><span class="value">.4,0,1,1</span></div>
	</div>
</div>
</body></html>
