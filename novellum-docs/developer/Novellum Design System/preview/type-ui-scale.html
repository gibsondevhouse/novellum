<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>UI scale</title>
<link rel="stylesheet" href="_preview.css">
<style>
	.scale { display: grid; gap: var(--space-2); }
	.line {
		display: grid;
		grid-template-columns: 84px 1fr 80px;
		align-items: baseline;
		gap: var(--space-4);
		padding: var(--space-2) 0;
		border-bottom: 1px solid var(--border-subtle);
	}
	.line:last-child { border-bottom: none; }
	.tag {
		font-family: var(--mono);
		font-size: 11px;
		color: var(--fg3);
		text-transform: uppercase;
		letter-spacing: var(--tracking-wide);
	}
	.sample { color: var(--fg1); font-family: var(--sans); }
	.px { font-family: var(--mono); font-size: 11px; color: var(--fg3); text-align: right; }
	.t-xs   { font-size: 12px; }
	.t-sm   { font-size: 14px; }
	.t-base { font-size: 16px; }
	.t-lg   { font-size: 18px; }
	.t-xl   { font-size: 20px; font-weight: 600; }
	.t-2xl  { font-size: 24px; font-weight: 600; }
	.t-3xl  { font-size: 30px; font-family: var(--serif-display); font-weight: 400; letter-spacing: var(--tracking-tight); }
</style>
</head><body>
<div class="scale">
	<div class="line"><span class="tag">3xl · h1</span><span class="sample t-3xl">The Mariner's Glass</span><span class="px">30px</span></div>
	<div class="line"><span class="tag">2xl · h2</span><span class="sample t-2xl">Chapter Two</span><span class="px">24px</span></div>
	<div class="line"><span class="tag">xl · h3</span><span class="sample t-xl">Recently read</span><span class="px">20px</span></div>
	<div class="line"><span class="tag">lg</span><span class="sample t-lg">An emphasised paragraph or reader prose.</span><span class="px">18px</span></div>
	<div class="line"><span class="tag">base · p</span><span class="sample t-base">Body copy — the default running text in chrome.</span><span class="px">16px</span></div>
	<div class="line"><span class="tag">sm</span><span class="sample t-sm">Secondary body, labels, button text.</span><span class="px">14px</span></div>
	<div class="line"><span class="tag">xs</span><span class="sample t-xs">Eyebrow / chip / meta.</span><span class="px">12px</span></div>
</div>
</body></html>
