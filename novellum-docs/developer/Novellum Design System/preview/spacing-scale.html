<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="_preview.css">
<style>
	.scale { display: grid; gap: var(--space-2); }
	.row {
		display: grid;
		grid-template-columns: 56px 1fr 48px;
		gap: var(--space-3);
		align-items: center;
		padding: var(--space-1) 0;
	}
	.tag { font-family: var(--mono); font-size: 11px; color: var(--fg3); }
	.bar { height: 14px; background: var(--accent-nova-blue); border-radius: var(--radius-xs); opacity: 0.85; }
	.px  { font-family: var(--mono); font-size: 11px; color: var(--fg2); text-align: right; }
</style>
</head><body>
<div class="scale">
	<div class="row"><span class="tag">space-1</span><span><span class="bar" style="width: 4px;"></span></span><span class="px">4px</span></div>
	<div class="row"><span class="tag">space-2</span><span><span class="bar" style="width: 8px;"></span></span><span class="px">8px</span></div>
	<div class="row"><span class="tag">space-3</span><span><span class="bar" style="width: 12px;"></span></span><span class="px">12px</span></div>
	<div class="row"><span class="tag">space-4</span><span><span class="bar" style="width: 16px;"></span></span><span class="px">16px</span></div>
	<div class="row"><span class="tag">space-5</span><span><span class="bar" style="width: 20px;"></span></span><span class="px">20px</span></div>
	<div class="row"><span class="tag">space-6</span><span><span class="bar" style="width: 24px;"></span></span><span class="px">24px</span></div>
	<div class="row"><span class="tag">space-8</span><span><span class="bar" style="width: 32px;"></span></span><span class="px">32px</span></div>
	<div class="row"><span class="tag">space-10</span><span><span class="bar" style="width: 40px;"></span></span><span class="px">40px</span></div>
	<div class="row"><span class="tag">space-12</span><span><span class="bar" style="width: 48px;"></span></span><span class="px">48px</span></div>
	<div class="row"><span class="tag">space-16</span><span><span class="bar" style="width: 64px;"></span></span><span class="px">64px</span></div>
</div>
</body></html>
