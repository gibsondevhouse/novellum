<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Sidebar</title>
<link rel="stylesheet" href="_preview.css">
<style>
	body { padding: 0; }
	.demo { display: grid; grid-template-columns: 220px 1fr; min-height: 280px; }
	.sidebar {
		background: var(--surface-ground);
		border-right: 1px solid var(--border-default);
		padding: var(--space-3) 0;
		display: flex;
		flex-direction: column;
		gap: 2px;
	}
	.item {
		display: flex;
		align-items: center;
		gap: var(--space-3);
		padding: var(--space-2) var(--space-3);
		margin: 0 var(--space-2);
		border-radius: var(--radius-sm);
		color: var(--fg2);
		font-size: 14px;
		cursor: pointer;
		text-decoration: none;
		transition: background-color var(--dur-fast) var(--ease-standard), color var(--dur-fast) var(--ease-standard);
	}
	.item:hover { background: var(--surface-hover); color: var(--fg1); }
	.item.active { background: var(--surface-hover); color: var(--fg1); }
	.item.active::before {
		content: '';
		position: relative;
		left: -8px;
		width: 3px; height: 16px;
		background: var(--accent-teal);
		border-radius: 2px;
		margin-right: -8px;
	}
	.item svg { flex-shrink: 0; }
	.divider { border: none; border-top: 1px solid var(--border-default); margin: var(--space-3) var(--space-3); }
	.scrub { padding: var(--space-4); display: flex; flex-direction: column; gap: 10px; }
	.scrub .label { font-family: var(--mono); font-size: 10px; color: var(--fg3); text-transform: uppercase; letter-spacing: var(--tracking-wide); }
	.scrub .text { font-size: 12px; color: var(--fg2); line-height: 1.6; }
</style>
</head><body>
<div class="demo">
	<aside class="sidebar">
		<a class="item active" href="#">
			<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
			Home
		</a>
		<a class="item" href="#">
			<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
			Reader
		</a>
		<a class="item" href="#">
			<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
			Nova
		</a>
		<a class="item" href="#">
			<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
			Projects
		</a>
		<hr class="divider">
		<a class="item" href="#">
			<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
			Settings
		</a>
	</aside>
	<div class="scrub">
		<span class="label">Anatomy</span>
		<p class="text">220 px wide · ground surface · default-border right · 4px teal accent rail on active. Items use surface-hover wash on hover or active. Icons inherit currentColor.</p>
	</div>
</div>
</body></html>
